<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おすすめ夕飯診断</title>

    <style>
        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #667eea, #764ba2,#6dd5ed, #2193b0);
            min-height: 100vh;
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: white;
            text-align: center;
        }
        
        h2 {
            color: white;
            text-align: center;
        }
        
        .question { display:none; }
        .question.active { display:block; }
        
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .progress {
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:20px;
        }
        
        .progress-dot {
            width:10px;
            height:10px;
            border-radius:50%;
            background:#ddd;
        }
        
        .progress-dot.active {
            background:#fff;
        }
        
        .result { display:none; }
        .result.active { display:block; }
        
        .dinner-image {
            width:100%;
            border-radius:16px;
            margin:20px 0;
            transition: opacity 0.3s;
        }
        
        .spinner {
            width:40px;
            height:40px;
            border:4px solid rgba(255,255,255,0.3);
            border-top:4px solid white;
            border-radius:50%;
            animation: spin 1s linear infinite;
            margin:20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>🍱 夕飯診断</h1>

            <div class="progress" id="progress">
                <div class="progress-dot active"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>

            <div id="q1" class="question active">
                <h2>気分は？</h2>
                <button onclick="answer(1,'さっぱり')">さっぱり</button>
                <button onclick="answer(1,'がっつり')">がっつり</button>
                <button onclick="answer(1,'ヘルシー')">ヘルシー</button>
            </div>

            <div id="q2" class="question">
                <h2>予算は？</h2>
                <button onclick="answer(2,'安い')">〜500円</button>
                <button onclick="answer(2,'普通')">500〜1000円</button>
                <button onclick="answer(2,'高い')">1000円〜</button>
            </div>

            <div id="q3" class="question">
                <h2>好きな味は？</h2>
                <button onclick="answer(3,'和風')">和風</button>
                <button onclick="answer(3,'洋風')">洋風</button>
                <button onclick="answer(3,'中華')">中華</button>
                <button onclick="answer(3,'韓国')">韓国</button>
            </div>

            <div id="loading" style="display:none; text-align:center;">
                <div class="spinner"></div>
                <h2>診断中...</h2>
            </div>

            <div id="result" class="result">
                <h2 id="dinnerName"></h2>

                <img id="dinnerImage" class="dinner-image">

                <p id="weatherInfo"></p>
                <p id="dinnerDesc"></p>

                <button onclick="restart()">もう一度</button>
            </div>

        </div>
    </div>

    <script>
        let answers = {};
        let isProcessing = false;
        
        function answer(q,v){
            if(isProcessing) return;
            answers[q]=v;
        
            document.getElementById("q"+q).classList.remove("active");
        
            if(q<3){
                document.getElementById("q"+(q+1)).classList.add("active");
        
                document.querySelectorAll(".progress-dot")[q].classList.add("active");
            } else {
                startResult();
            }
        }
        
        function startResult(){
            isProcessing = true;
            document.getElementById("loading").style.display="block";
        
            navigator.geolocation.getCurrentPosition(async pos=>{
                const temp = await getWeather(pos.coords.latitude,pos.coords.longitude);
                showResult(temp);
            },()=>{
                showResult(25);
            });
        }
        
        async function getWeather(lat,lon){
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=YOUR_API_KEY&units=metric`
            );
            const data = await res.json();
            return data.main.temp;
        }
        
        function showResult(temp){

            const allMenus = [
                "オムライス",
                "ハンバーグ",
                "焼肉",
                "しゃぶしゃぶ",
                "ラーメン",
                "うどん",
                "そば",
                "寿司",
                "カレー",
                "パスタ",
                "ピザ",
                "餃子",
                "チャーハン",
                "ステーキ",
                "唐揚げ",
                "とんかつ",
                "お好み焼き",
                "焼き鳥",
                "鍋",
                "ビビンバ",
                "サムギョプサル",
                "ガパオライス",
                "麻婆豆腐",
                "牛丼",
                "親子丼",
                "天丼",
                "海鮮丼",
                "ロコモコ",
                "タコライス",
                "ドリア",
                "グラタン",
                "シチュー",
                "ハンバーガー",
                "アヒージョ",
                "ムニエル",
                "たこ焼き",
                "もんじゃ焼き",
                "串カツ",
                "おでん",
                "すき焼き",
                "生姜焼き",
                "チキン南蛮",
                "油淋鶏",
                "酢豚",
                "青椒肉絲",
                "回鍋肉",
                "天津飯",
                "中華丼",
                "焼きそば",
                "冷やし中華",
                "生春巻き",
                "ロールキャベツ",
                "メンチカツ",
                "コロッケ",
                "ハヤシライス",
                "リゾット",
                "ラザニア",
                "チーズフォンデュ",
                "焼きうどん",
                "ちゃんぽん",
                "皿うどん",
                "チーズタッカルビ",
                "ヤンニョムチキン",
                "チヂミ",
                "小籠包",
                "エビチリ",
                "エビマヨ",
                "カツ丼",
                "うな重",
                "ちらし寿司",
                "手巻き寿司"
            ];

            const menu = allMenus[Math.floor(Math.random() * allMenus.length)];
        
            document.getElementById("loading").style.display="none";
        
            document.getElementById("result").classList.add("active");
        
            document.getElementById("dinnerName").textContent = menu;
            document.getElementById("dinnerDesc").textContent =
                `今日のおすすめは${menu}！`;
        
            document.getElementById("weatherInfo").textContent =
                `現在${Math.round(temp)}℃`;
        
            const img = document.getElementById("dinnerImage");
            img.style.opacity=0;
        
            setTimeout(()=>{
                img.src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c";
                img.style.opacity=1;
            },200);
            }
        
            function restart(){
                location.reload();
        }
    </script>

</body>

</html>
