        }
        .question {
            display: none;
            animation: fadeIn 0.5s;
        }
        .question.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: 
        translateY(20px);
            }
            to {
                opacity: 1;
                transform: 
        translateY(0);
            }
        }
        button {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            filter: brightness(1.1);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        .result.active {
            display: block;
        }
        .dinner-emoji {
            font-size: 100px;
            margin: 30px 0;

        }
        @keyframes bounce {

             }

    initLIFF();

        async function getWeather(lat, lon) {

        const url =
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ja`;

        const response = await fetch(url);
        const data = await response.json();

        return data.main.temp;
        }

        function getTempCategory(temp) {
          if (temp >= 28) {
              return '暑い';
          } else if (temp <= 15) {
                return '寒い';
          } else {
              return '普通';
          }
        }
        function answer(questionNum, value) {
            answers[questionNum] = value;
            
             // プログレスバー更新
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index < questionNum) {
                    dot.classList.add('active');
                }
            });

            document.getElementById('q' + questionNum).classList.remove('active');
            
            if (questionNum < 3) {
                document.getElementById('q' + (questionNum + 1)).classList.add('active');
            } else {
            
            document.getElementById('loading').style.display = 'block';

            navigator.geolocation.getCurrentPosition(
                async position => {

                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    const temp = await getWeather(lat, lon);

                    answers[4] = getTempCategory(temp);

                    showResult(temp);
                },
                error => {
                    alert('位置情報が取得できませんでした');
                    showResult(25);
              }
          );
